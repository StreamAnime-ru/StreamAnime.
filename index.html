<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamAnime - Free Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Stream<span>Anime</span></div>
    </header>

    <div class="container">
        <div class="player-container" id="playerSection">
            <h2 id="playingTitle">Loading Anime...</h2>
            <div class="video-wrapper">
                <iframe id="videoPlayer" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
        </div>

        <h2 class="section-title">Popular Anime</h2>
        <div class="anime-grid" id="popularGrid">
            <p class="loading-text">Loading popular titles...</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
