<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamAnime - Modern Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" id="nav-logo"><span class="accent-purple">Stream</span><span class="accent-cyan">Anime</span></a>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="#" class="nav-item active" data-target="home">Home</a></li>
                <li><a href="#" class="nav-item" data-target="popular">Popular</a></li>
                <li><a href="#" class="nav-item" data-target="latest">Latest</a></li>
                <li class="dropdown">
                    <a href="#" class="nav-item">Genres <i class="fas fa-caret-down"></i></a>
                    <div class="dropdown-content" id="genre-dropdown"></div>
                </li>
            </ul>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search anime...">
            </div>

            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="main-layout">
        
        <div id="home-view" class="view-page active-view">
            <section class="hero" id="hero-banner"></section>

            <section class="anime-section hidden" id="continue-watching-section">
                <h2 class="section-title"><i class="fas fa-history"></i> Continue Watching</h2>
                <div class="anime-grid" id="continue-watching-grid"></div>
            </section>

            <section class="anime-section hidden" id="favorites-section">
                <h2 class="section-title"><i class="fas fa-heart text-purple"></i> My Favorites</h2>
                <div class="anime-grid" id="favorites-grid"></div>
            </section>

            <section class="anime-section">
                <h2 class="section-title"><i class="fas fa-fire text-purple"></i> Trending Anime</h2>
                <div class="anime-grid" id="trending-grid"></div>
            </section>

            <section class="anime-section" id="popular-section-anchor">
                <h2 class="section-title"><i class="fas fa-star text-cyan"></i> Popular This Week</h2>
                <div class="anime-grid" id="popular-grid"></div>
            </section>

            <section class="anime-section">
                <h2 class="section-title"><i class="fas fa-film"></i> Anime Movies</h2>
                <div class="anime-grid" id="movies-grid"></div>
            </section>
        </div>

        <div id="player-view" class="view-page hidden">
            <button class="back-btn" id="back-to-home-btn"><i class="fas fa-arrow-left"></i> Back to Home</button>
            
            <div class="player-container">
                <div class="player-main">
                    <div class="video-wrapper" id="video-wrapper">
                        <div id="video-player-container" style="width:100%; height:100%;">
                            <video id="main-video" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" poster="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1200" style="width:100%; height:100%;"></video>
                        </div>
                        
                        <div class="custom-controls">
                            <div class="progress-area">
                                <div class="progress-bar"><span></span></div>
                            </div>
                            <div class="controls-btns">
                                <div class="left-controls">
                                    <button id="play-pause"><i class="fas fa-play"></i></button>
                                    <button id="skip-back"><i class="fas fa-backward"></i></button>
                                    <button id="skip-forward"><i class="fas fa-forward"></i></button>
                                    <div class="volume-container">
                                        <button id="volume-icon"><i class="fas fa-volume-up"></i></button>
                                        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1">
                                    </div>
                                    <span class="video-time">0:00 / 0:00</span>
                                </div>
                                <div class="right-controls">
                                    <select id="playback-speed" class="speed-select">
                                        <option value="0.5">0.5x</option>
                                        <option value="1" selected>1.0x</option>
                                        <option value="1.5">1.5x</option>
                                        <option value="2">2.0x</option>
                                    </select>
                                    <button id="pip-btn" title="Picture in Picture"><i class="fas fa-clone"></i></button>
                                    <button id="fullscreen-btn"><i class="fas fa-expand"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="anime-details">
                        <div class="details-header">
                            <h1 id="player-title">Anime Title</h1>
                            <button id="favorite-toggle-btn" class="fav-btn"><i class="far fa-heart"></i> Add to Favorites</button>
                        </div>
                        <div class="details-meta">
                            <span id="player-rating"><i class="fas fa-star text-cyan"></i> 0.0</span>
                            <span id="player-year">2026</span>
                            <span id="player-studio">Studio</span>
                        </div>
                        <div class="details-genres" id="player-genres"></div>
                        <p id="player-description" class="player-description">Description goes here...</p>
                    </div>
                </div>

                <div class="player-sidebar">
                    <h3>Episodes</h3>
                    <div class="episode-list" id="episode-list-container"></div>
                </div>
            </div>

            <section class="anime-section related-section">
                <h2 class="section-title">Related Anime</h2>
                <div class="anime-grid" id="related-grid"></div>
            </section>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
