<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream - Stream Your Favorite Anime</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" id="logo"><i class="fa-solid fa-play"></i> AniStream</a>
            
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search anime...">
                    <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
                <div class="search-suggestions" id="suggestions"></div>
            </div>

            <ul class="nav-links" id="nav-links">
                <li><a href="#" class="nav-item active" data-target="home-page">Home</a></li>
                <li><a href="#" class="nav-item" data-target="browse-page">Browse</a></li>
                <li><a href="#" class="nav-item" data-target="library-page">My Library</a></li>
            </ul>

            <div class="burger" id="burger">
                <div class="line1"></div>
                <div class="line2"></div>
                <div class="line3"></div>
            </div>
        </div>
    </nav>

    <main id="main-content">
        
        <section id="home-page" class="page-section active">
            <div class="hero-slider" id="hero-slider">
                <div class="skeleton loading-hero"></div>
            </div>

            <div class="content-section hidden" id="recent-section">
                <h2 class="section-title"><i class="fa-solid fa-clock-rotate-left"></i> Continue Watching</h2>
                <div class="anime-grid" id="recent-grid"></div>
            </div>

            <div class="content-section">
                <h2 class="section-title"><i class="fa-solid fa-fire"></i> Trending Now</h2>
                <div class="anime-grid" id="trending-grid">
                    <div class="skeleton card-skeleton"></div>
                    <div class="skeleton card-skeleton"></div>
                    <div class="skeleton card-skeleton"></div>
                    <div class="skeleton card-skeleton"></div>
                    <div class="skeleton card-skeleton"></div>
                </div>
            </div>

            <div class="content-section">
                <h2 class="section-title"><i class="fa-solid fa-star"></i> Popular Shows</h2>
                <div class="anime-grid" id="popular-grid"></div>
            </div>
        </section>

        <section id="browse-page" class="page-section">
            <h2 class="section-title">Browse Anime</h2>
            
            <div class="filter-panel">
                <div class="filter-group">
                    <label>Genre</label>
                    <select id="filter-genre">
                        <option value="">All Genres</option>
                        <option value="action">Action</option>
                        <option value="adventure">Adventure</option>
                        <option value="comedy">Comedy</option>
                        <option value="drama">Drama</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="sci-fi">Sci-Fi</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Format</label>
                    <select id="filter-format">
                        <option value="">All Formats</option>
                        <option value="tv">TV Series</option>
                        <option value="movie">Movie</option>
                        <option value="ova">OVA</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort By</label>
                    <select id="filter-sort">
                        <option value="popularity">Popularity</option>
                        <option value="score">Top Rated</option>
                    </select>
                </div>
                <button id="apply-filters-btn" class="btn-primary">Apply Filters</button>
            </div>

            <div class="anime-grid" id="browse-grid"></div>
            
            <div class="pagination">
                <button id="prev-page" disabled><i class="fa-solid fa-chevron-left"></i> Prev</button>
                <span id="page-number">Page 1</span>
                <button id="next-page">Next <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>

        <section id="library-page" class="page-section">
            <div class="library-tabs">
                <button class="lib-tab active" data-lib="watchlist">Watchlist</button>
                <button class="lib-tab" data-lib="favorites">Favorites</button>
            </div>
            <div class="anime-grid" id="library-grid"></div>
        </section>

        <section id="details-page" class="page-section">
            <button class="back-btn" id="back-to-home"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <div id="details-container">
                </div>
        </section>

    </main>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 AniStream. Built with pure performance.</p>
            <div class="social-links">
                <a href="#"><i class="fa-brands fa-twitter"></i></a>
                <a href="#"><i class="fa-brands fa-discord"></i></a>
                <a href="#"><i class="fa-brands fa-github"></i></a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
