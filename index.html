<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamAnime - Modern Anime Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="loading-screen" class="loading-screen">
        <div class="spinner"></div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo" id="nav-logo"><span class="accent-purple">Stream</span><span class="accent-cyan">Anime</span></a>
            
            <ul class="nav-links" id="nav-links">
                <li><a href="#" class="nav-item active" data-target="home">Home</a></li>
                <li><a href="#" class="nav-item" data-target="popular">Popular</a></li>
                <li><a href="#" class="nav-item" data-target="latest">Latest</a></li>
                <li class="dropdown">
                    <a href="#" class="nav-item">Genres <i class="fas fa-caret-down"></i></a>
                    <div class="dropdown-content" id="genre-dropdown"></div>
                </li>
            </ul>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="search-input" placeholder="Search anime...">
            </div>

            <div class="hamburger" id="hamburger">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>
        </div>
    </nav>

    <main class="main-layout">
        
        <div id="home-view" class="view-page active-view">
            <section class="hero" id="hero-banner"></section>

            <section class="anime-section">
                <h2 class="section-title"><i class="fas fa-fire text-purple"></i> Trending Anime</h2>
                <div class="anime-grid" id="trending-grid"></div>
            </section>

            <section class="anime-section" id="popular-section-anchor">
                <h2 class="section-title"><i class="fas fa-star text-cyan"></i> Popular This Week</h2>
                <div class="anime-grid" id="popular-grid"></div>
            </section>
        </div>

        <div id="player-view" class="view-page hidden">
            <button class="back-btn" id="back-to-home-btn"><i class="fas fa-arrow-left"></i> Back to Home</button>
            
            <div class="language-selector">
                <button id="btn-sub" class="lang-btn active">SUB</button>
                <button id="btn-dub" class="lang-btn">DUB</button>
            </div>

            <div class="player-container">
                <div class="player-main">
                    <div class="video-wrapper" id="video-wrapper">
                        <video id="main-video" poster="https://images.unsplash.com/photo-1578632767115-351597cf2477?w=1200" controls></video>
                    </div>

                    <div class="anime-details">
                        <div class="details-header">
                            <h1 id="player-title">Anime Title</h1>
                        </div>
                        <div class="details-meta">
                            <span id="player-rating"><i class="fas fa-star text-cyan"></i> 0.0</span>
                            <span id="player-status">Airing</span>
                        </div>
                        <p id="player-description" class="player-description">Description goes here...</p>
                    </div>
                </div>

                <div class="player-sidebar">
                    <h3>Episodes</h3>
                    <div class="episode-list" id="episode-list-container">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
